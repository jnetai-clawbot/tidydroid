name: Build Release APK
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true
        default: '1.0.1'
jobs:
  build-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: '17', distribution: 'temurin', cache: gradle}
      - uses: gradle/actions/setup-gradle@v3
      - run: chmod +x gradlew
      - run: |
          keytool -genkey -v -keystore keystore.jks -alias tidydroid -keyalg RSA -keysize 2048 -validity 10000 -storepass changeit -keypass changeit -dname "CN=TidyDroid, O=jnetaol, C=UK" 2>/dev/null || true
      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT; fi
      - env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: changeit
          KEY_ALIAS: tidydroid
          KEY_PASSWORD: changeit
        run: ./gradlew assembleRelease --stacktrace
      - run: |
          mkdir -p apk
          cp app/build/outputs/apk/release/app-release.apk "apk/TidyDroid-v${{ steps.version.outputs.version }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: TidyDroid-Release
          path: app/build/outputs/apk/release/app-release.apk
      - uses: softprops/action-gh-release@v1
        with:
          name: "TidyDroid v${{ steps.version.outputs.version }}"
          files: apk/TidyDroid-v${{ steps.version.outputs.version }}.apk
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.version) }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
